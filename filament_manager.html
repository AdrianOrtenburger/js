<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filament Manager v17 - Form on Top</title>
    <style>
        :root {
            --primary-color: #ff9f43;
            --primary-hover: #ff8c00;
            --text-dark: #2d3436;
            --text-light: #ffffff;
            --bg-body: #eeeeee;
            --bg-card: #ffffff;
            --border-color: #d1d1d1;
            --row-hover: #fff3e0;
            
            --btn-inc: #2ecc71; 
            --btn-dec: #f1c40f; 
            --btn-del: #e74c3c; 
            --btn-info: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background-color: var(--bg-body);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* --- Header --- */
        .header-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 20px; background: var(--text-dark); padding: 15px 20px;
            border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h2 { margin: 0; color: var(--primary-color); }
        #menuBtn {
            background-color: var(--primary-color); color: var(--text-dark); border: none;
            padding: 8px 16px; cursor: pointer; font-weight: bold; border-radius: 4px;
            transition: background 0.2s;
        }

        /* --- Add Form (NOW ON TOP) --- */
        .add-form {
            background: var(--bg-card); padding: 25px; border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; align-items: end;
            margin-bottom: 20px; /* Space between form and search */
        }
        .add-form h3 { width: 100%; grid-column: 1 / -1; margin-top: 0; color: var(--text-dark); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; margin-bottom: 5px;}
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.85rem; margin-bottom: 6px; font-weight: bold; color: #555; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; background: #fafafa; }
        button#addBtn {
            background-color: var(--text-dark); color: var(--primary-color); border: none;
            padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; height: 38px;
        }

        /* --- Search Bar --- */
        .search-container { margin-bottom: 15px; }
        .search-input {
            width: 100%; padding: 12px 15px; font-size: 1rem; border: 2px solid var(--border-color);
            border-radius: 6px; box-sizing: border-box; background-color: var(--bg-card);
        }
        .search-input:focus { outline: none; border-color: var(--primary-color); }

        /* --- Sidebar & Modals --- */
        .sidebar {
            height: 100%; width: 250px; position: fixed; top: 0; right: -300px;
            visibility: hidden; background-color: var(--text-dark); color: var(--bg-body);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 60px 20px 20px 20px; display: flex; flex-direction: column; gap: 15px;
            z-index: 1002; box-shadow: none;
        }
        .sidebar.open { right: 0; visibility: visible; box-shadow: -5px 0 15px rgba(0,0,0,0.3); }
        .sidebar h3 { margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 10px; color: var(--primary-color); }
        .sidebar button.action-btn {
            background-color: #444; color: white; border: none; padding: 12px; cursor: pointer;
            text-align: left; width: 100%; border-radius: 4px; font-weight: bold;
            display: flex; align-items: center; gap: 10px; transition: background 0.2s;
        }
        .sidebar button.action-btn:hover { background-color: #555; }
        .close-sidebar {
            position: absolute; top: 15px; right: 15px; background: none; border: none;
            font-size: 1.8rem; cursor: pointer; color: white; line-height: 1;
        }
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); z-index: 1000;
        }
        #overlay.show { display: block; }

        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 600px; background: white; padding: 25px;
            border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); z-index: 2000;
            max-height: 80vh; overflow-y: auto;
        }
        .modal.show { display: block; }
        .modal h3 { margin-top: 0; color: var(--text-dark); border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        .modal textarea { width: 100%; height: 250px; font-family: monospace; padding: 10px; background: #f8f8f8; border: 1px solid #ccc; }
        .modal-buttons { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #ccc; color: #333; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-save { background: var(--btn-inc); color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        /* --- TABLE STYLING --- */
        table.main-table {
            width: 100%; border-collapse: collapse; background: var(--bg-card);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; 
            table-layout: fixed; border-radius: 8px 8px 0 0; overflow: hidden;
        }
        thead { background-color: var(--primary-color); color: var(--text-dark); }
        .main-table th {
            padding: 12px; border-bottom: 2px solid var(--text-dark); border-right: 1px solid rgba(0,0,0,0.1);
            text-align: left; cursor: pointer; user-select: none; position: relative; font-weight: bold;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .main-table th:hover { background-color: var(--primary-hover); }
        .main-table th.sort-asc::after { content: '▲'; position:absolute; right: 15px; font-size: 0.8em; }
        .main-table th.sort-desc::after { content: '▼'; position:absolute; right: 15px; font-size: 0.8em; }
        .main-table th.dragging { opacity: 0.5; background-color: #ffeaa7; }
        .main-table th.drag-over { border-left: 2px solid #2d3436; }
        .resizer { position: absolute; top: 0; right: 0; width: 5px; cursor: col-resize; user-select: none; height: 100%; z-index: 10; }
        .resizer:hover { background-color: rgba(0,0,0,0.2); }

        .main-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-color); vertical-align: middle; color: #333; }
        .main-table tr:hover td { background-color: var(--row-hover); }
        .main-table td input {
            width: 100%; border: 1px solid transparent; background: transparent;
            font-family: inherit; font-size: inherit; padding: 4px; box-sizing: border-box; 
        }
        .main-table td input:focus { outline: none; border-bottom: 2px solid var(--primary-color); background: white; }
        .main-table td.center { text-align: center; }

        .action-group { display: flex; gap: 4px; justify-content: center; }
        .btn-mini {
            width: 28px; height: 28px; border-radius: 4px; cursor: pointer; display: flex; 
            align-items: center; justify-content: center; border: none; color: white; 
            font-weight: bold; font-size: 1.1rem;
        }
        .btn-inc { background-color: var(--btn-inc); }
        .btn-dec { background-color: var(--btn-dec); color: #333; }
        .btn-del { background-color: var(--btn-del); font-size: 0.9rem; }
        .btn-hist { background-color: var(--btn-info); font-size: 1rem; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>Filament Management System</h2>
        <button id="menuBtn" onclick="toggleSidebar()">☰ Menü</button>
    </div>

    <div class="add-form">
        <!-- <h3>Neuer Eintrag</h3> -->
        <div class="form-group"><label>ID (Auto)</label><input type="text" id="newId" placeholder="---" readonly></div>
        <div class="form-group"><label>Marke</label><input type="text" id="newBrand" list="listBrands"></div>
        <div class="form-group"><label>Type</label><input type="text" id="newType" list="listTypes"></div>
        <div class="form-group"><label>Farbe</label><input type="text" id="newColor" list="listColors"></div>
        <div class="form-group"><label>Info</label><input type="text" id="newInfo" list="listInfos"></div>
        <div class="form-group"><label>Gewicht (g)</label><input type="number" id="newWeight" value="1000"></div>
        <div class="form-group"><label>Anzahl</label><input type="number" id="newCount" value="1"></div>
        <div class="form-group" style="align-items: center;"><label>Sampel</label><input type="checkbox" id="newSample"></div>
        <button id="addBtn">Hinzufügen</button>
    </div>

    <div class="search-container">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 Suchen (Marke, Farbe, Typ...)" onkeyup="renderTable()">
    </div>

    <div id="overlay" onclick="closeAllModals()"></div>
    
    <div id="sidebar" class="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        <h3>Datenverwaltung</h3>
        <button class="action-btn" onclick="exportData()">📤 Exportieren (JSON)</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">📥 Importieren (JSON)</button>
        <input type="file" id="importFile" style="display: none" accept=".json" onchange="readImportFile(this)">
        <button class="action-btn" onclick="openMappingEditor()">🛠 Mapping bearbeiten</button>
        <button class="action-btn" onclick="resetColumnSettings()">↺ Spalten Reset</button>
        <div style="margin-top: auto; font-size: 0.8rem; color: #888; border-top: 1px solid #555; padding-top: 10px;">
            Gespeichert im LocalStorage.
        </div>
    </div>

    <div id="mappingModal" class="modal">
        <h3>Marken-Mapping Editor (JSON)</h3>
        <textarea id="mappingEditorText"></textarea>
        <div class="modal-buttons"><button class="btn-cancel" onclick="closeAllModals()">Abbrechen</button><button class="btn-save" onclick="saveMappingFromEditor()">Speichern</button></div>
    </div>
    <div id="historyModal" class="modal">
        <h3 id="historyTitle">Verlauf</h3>
        <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
            <thead><tr style="text-align:left;"><th>Datum</th><th>Änderung</th><th>Grund</th></tr></thead>
            <tbody id="historyTableBody"></tbody>
        </table>
        <div class="modal-buttons"><button class="btn-cancel" onclick="closeAllModals()">Schließen</button></div>
    </div>
    <div id="importModal" class="modal">
        <h3>Daten Importieren</h3>
        <p>Aktion wählen:</p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeAllModals()">Abbrechen</button>
            <button class="btn-merge" onclick="confirmMerge()" style="background:#3498db; color:white; border:none; padding:10px;">🔗 Zusammenfügen</button>
            <button class="btn-overwrite" onclick="confirmOverwrite()" style="background:#e74c3c; color:white; border:none; padding:10px;">⚠️ Überschreiben</button>
        </div>
    </div>

    <datalist id="listBrands"></datalist><datalist id="listTypes"></datalist><datalist id="listColors"></datalist><datalist id="listInfos"></datalist>

    <table class="main-table">
        <thead id="tableHeader"></thead>
        <tbody id="filamentTableBody"></tbody>
    </table>

    <script>
        const STORAGE_KEY = 'filament_inventory_v16';
        const MAPPING_KEY = 'filament_mapping_v1';
        const SETTINGS_KEY = 'filament_settings_v1';
        
        let inventory = [];
        let pendingImportData = null;
        let brandMapping = {};

        // Default Column Config
        const DEFAULT_COLUMNS = [
            { key: 'id', label: 'ID', width: 90 },
            { key: 'brand', label: 'Marke', width: 150 },
            { key: 'type', label: 'Type', width: 100 },
            { key: 'color', label: 'Farbe', width: 120 },
            { key: 'info', label: 'Info', width: 150 },
            { key: 'weight', label: 'Gewicht (g)', width: 90 },
            { key: 'count', label: 'Anzahl', width: 80 },
            { key: 'sample', label: 'Sampel', width: 70 }
        ];

        let columnSettings = [];
        let sortState = { key: 'id', direction: 'asc' };

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            loadMapping();
            loadSettings();
            updateAutocompleteLists();
            renderHeaders(); // NEW: Dynamic Headers
            renderTable();
            document.getElementById('addBtn').addEventListener('click', addEntry);
            
            // Auto ID listeners
            const updateId = () => {
                document.getElementById('newId').value = calculateNextId(
                    document.getElementById('newBrand').value, 
                    document.getElementById('newType').value
                );
            };
            document.getElementById('newBrand').addEventListener('input', updateId);
            document.getElementById('newType').addEventListener('input', updateId);
            document.getElementById('newBrand').addEventListener('change', (e) => {
                e.target.value = normalizeBrand(e.target.value);
                updateId();
            });
        });

        // --- COLUMN SETTINGS LOGIC ---
        function loadSettings() {
            const stored = localStorage.getItem(SETTINGS_KEY);
            if(stored) {
                columnSettings = JSON.parse(stored);
                // Simple merge check if new columns appeared in update
                if(columnSettings.length !== DEFAULT_COLUMNS.length) {
                    // Primitive reset if schema changed heavily
                    // columnSettings = JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
                }
            } else {
                columnSettings = JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
            }
        }

        function saveSettings() {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(columnSettings));
        }

        function resetColumnSettings() {
            if(confirm("Spaltenansicht zurücksetzen?")) {
                columnSettings = JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
                saveSettings();
                renderHeaders();
                renderTable();
                closeAllModals();
            }
        }

        // --- RENDER DYNAMIC HEADERS ---
        function renderHeaders() {
            const thead = document.getElementById('tableHeader');
            thead.innerHTML = '';
            const tr = document.createElement('tr');

            // 1. Data Columns (Sortable, Draggable, Resizable)
            columnSettings.forEach((col, index) => {
                const th = document.createElement('th');
                th.innerText = col.label;
                th.style.width = col.width + 'px';
                th.draggable = true; // Enable Drag
                th.dataset.index = index;
                th.dataset.key = col.key;
                
                // Sort Click
                th.onclick = (e) => {
                    // Prevent sort if clicking resizer
                    if(e.target.classList.contains('resizer')) return;
                    handleSort(col.key);
                };

                // Sort Indicator
                if (sortState.key === col.key) {
                    th.classList.add(sortState.direction === 'asc' ? 'sort-asc' : 'sort-desc');
                }

                // Drag Events
                th.addEventListener('dragstart', handleDragStart);
                th.addEventListener('dragover', handleDragOver);
                th.addEventListener('drop', handleDrop);
                th.addEventListener('dragend', handleDragEnd);

                // Resizer Handle
                const resizer = document.createElement('div');
                resizer.className = 'resizer';
                resizer.addEventListener('mousedown', (e) => initResize(e, index));
                
                th.appendChild(resizer);
                tr.appendChild(th);
            });

            // 2. Action Column (Fixed)
            const thAction = document.createElement('th');
            thAction.innerText = 'Aktion';
            thAction.style.width = '160px'; // Fixed width
            tr.appendChild(thAction);

            thead.appendChild(tr);
        }

        // --- RESIZE LOGIC ---
        let resizingColIndex = -1;
        let startX = 0;
        let startWidth = 0;

        function initResize(e, index) {
            e.preventDefault(); // Prevent text selection
            resizingColIndex = index;
            startX = e.pageX;
            startWidth = columnSettings[index].width;
            
            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
        }

        function doResize(e) {
            if (resizingColIndex === -1) return;
            const diff = e.pageX - startX;
            let newWidth = startWidth + diff;
            if (newWidth < 40) newWidth = 40; // Minimum width
            
            columnSettings[resizingColIndex].width = newWidth;
            
            // Direct DOM update for performance
            const th = document.querySelector(`th[data-index="${resizingColIndex}"]`);
            if(th) th.style.width = newWidth + 'px';
        }

        function stopResize() {
            if (resizingColIndex !== -1) {
                saveSettings(); // Save to localstorage
                renderTable(); // Re-render body cells to match
            }
            resizingColIndex = -1;
            document.removeEventListener('mousemove', doResize);
            document.removeEventListener('mouseup', stopResize);
        }

        // --- DRAG & DROP LOGIC ---
        let dragSrcIndex = -1;

        function handleDragStart(e) {
            dragSrcIndex = this.dataset.index;
            this.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragOver(e) {
            e.preventDefault();
            this.classList.add('drag-over');
            e.dataTransfer.dropEffect = 'move';
            return false;
        }

        function handleDragEnd(e) {
            this.classList.remove('dragging');
            document.querySelectorAll('th').forEach(th => th.classList.remove('drag-over'));
        }

        function handleDrop(e) {
            e.stopPropagation();
            const dropTargetIndex = this.dataset.index;

            if (dragSrcIndex !== dropTargetIndex) {
                // Swap elements in array
                const item = columnSettings.splice(dragSrcIndex, 1)[0];
                columnSettings.splice(dropTargetIndex, 0, item);
                
                saveSettings();
                renderHeaders();
                renderTable();
            }
            return false;
        }

        // --- TABLE RENDER (Updated for Columns) ---
        function renderTable() {
            const tbody = document.getElementById('filamentTableBody');
            tbody.innerHTML = '';
            
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(item => {
                if (!searchTerm) return true;
                return Object.values(item).some(val => String(val).toLowerCase().includes(searchTerm));
            });

            // Sorting logic
            const sorted = [...filtered].sort((a, b) => {
                let valA = a[sortState.key], valB = b[sortState.key];
                if (sortState.key === 'count') { valA = getCurrentCount(a); valB = getCurrentCount(b); }
                if (typeof valA === 'string') return valA.localeCompare(valB, undefined, { numeric: true });
                return (valA > valB) ? 1 : (valA < valB) ? -1 : 0;
            });
            if (sortState.direction === 'desc') sorted.reverse();

            sorted.forEach((item) => {
                const realIndex = inventory.indexOf(item);
                const tr = document.createElement('tr');
                const currentCount = getCurrentCount(item);

                // Render cells based on columnSettings order
                columnSettings.forEach(col => {
                    const td = document.createElement('td');
                    const key = col.key;

                    if (key === 'id') {
                        td.innerText = item.id; td.style.fontWeight = 'bold';
                    } else {
                        const input = document.createElement('input');
                        input.type = (key === 'weight' || key === 'count') ? 'number' : 'text';
                        
                        if (key === 'count') {
                            input.value = currentCount;
                            input.addEventListener('change', (e) => {
                                const diff = (parseInt(e.target.value)||0) - currentCount;
                                if(diff !== 0) { addHistoryEntry(inventory[realIndex], diff, "Manuelle Korrektur"); saveData(); renderTable(); }
                            });
                        } else if (key === 'sample') {
                            input.type = 'checkbox'; input.checked = item.sample; td.className = 'center';
                            input.addEventListener('change', (e) => updateEntry(realIndex, 'sample', e.target.checked));
                        } else {
                            input.value = item[key];
                            if(['brand','type','color','info'].includes(key)) {
                                input.setAttribute('list', 'list'+key.charAt(0).toUpperCase()+key.slice(1)+'s');
                            }
                            input.addEventListener('change', (e) => {
                                let val = e.target.value;
                                if(key === 'brand') val = normalizeBrand(val);
                                if(input.type==='number') val = parseFloat(val);
                                updateEntry(realIndex, key, val);
                                if(key==='brand') renderTable(); // re-render needed for brand normalization visual update
                            });
                        }
                        
                        // Fix for Sample Checkbox needing append differently
                        if (key !== 'sample') td.appendChild(input);
                        else td.appendChild(input); 
                    }
                    tr.appendChild(td);
                });

                // Fixed Action Column
                const tdAction = document.createElement('td');
                const actionDiv = document.createElement('div'); actionDiv.className = 'action-group';
                actionDiv.innerHTML = `
                    <button class="btn-mini btn-dec" onclick="changeCount(${realIndex}, -1)">-</button>
                    <button class="btn-mini btn-inc" onclick="changeCount(${realIndex}, 1)">+</button>
                    <button class="btn-mini btn-hist" onclick="showHistory(${realIndex})">🕒</button>
                    <button class="btn-mini btn-del" onclick="deleteEntry(${realIndex})">✕</button>
                `;
                tdAction.appendChild(actionDiv);
                tr.appendChild(tdAction);

                tbody.appendChild(tr);
            });
        }

        // --- Standard Logic (same as v15, heavily condensed for brevity) ---
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
        function closeAllModals() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('overlay').classList.remove('show'); document.querySelectorAll('.modal').forEach(m=>m.classList.remove('show')); }
        
        function handleSort(key) {
            sortState.direction = (sortState.key === key && sortState.direction === 'asc') ? 'desc' : 'asc';
            sortState.key = key;
            renderHeaders(); renderTable();
        }

        function loadData() {
            const data = localStorage.getItem(STORAGE_KEY);
            inventory = data ? JSON.parse(data) : [];
            inventory.forEach(i => { if(!i.history) i.history = [{date:new Date().toISOString(), amount: i.count||0, note:"Init"}]; i.count = getCurrentCount(i); });
            if(!data) saveData();
        }
        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory)); updateAutocompleteLists(); }
        function loadMapping() { brandMapping = JSON.parse(localStorage.getItem(MAPPING_KEY) || JSON.stringify({ "Bambu Lab": ["bambu"], "Sunlu": ["sunlu"] })); } 
        function normalizeBrand(inVal) { if(!inVal)return""; const l=inVal.trim().toLowerCase(); for(let[k,v]of Object.entries(brandMapping))if(k.toLowerCase()===l||v.includes(l))return k; return inVal.trim(); }
        
        function getCurrentCount(i) { return (i.history||[]).reduce((s,x)=>s+x.amount,0); }
        function addHistoryEntry(i,a,n) { i.history.push({date:new Date().toISOString(), amount:a, note:n}); i.count = getCurrentCount(i); }
        
        function changeCount(idx, d) { if(getCurrentCount(inventory[idx])+d >=0){ addHistoryEntry(inventory[idx], d, d>0?"Inkrement":"Dekrement"); saveData(); renderTable(); } }
        function updateEntry(idx, k, v) { inventory[idx][k]=v; saveData(); if(['brand','type','color'].includes(k)) updateAutocompleteLists(); }
        function deleteEntry(idx) { if(confirm("Löschen?")) { inventory.splice(idx,1); saveData(); renderTable(); } }

        function updateAutocompleteLists() { 
            ['brand','type','color','info'].forEach(k => {
                const list = document.getElementById('list'+k.charAt(0).toUpperCase()+k.slice(1)+'s');
                list.innerHTML = '';
                [...new Set(inventory.map(i=>i[k]))].sort().forEach(v => {if(v)list.innerHTML+=`<option value="${v}">`});
            });
        }
        function calculateNextId(b, t) { 
            // Simple logic placeholder (full logic in prev versions)
            return "ID..."; // Simplified for this display, assumes logic is copied
        }

        // Re-injecting full ID logic for functionality
        function calculateNextId(brandName, typeName) {
            const cleanBrand = normalizeBrand(brandName); if (!cleanBrand) return '';
            const normBrand = cleanBrand.toLowerCase(); const normType = (typeName || '').trim().toLowerCase();
            const getOff = (t) => t.includes('silk')?100:t.includes('matte')?500:t.includes('pla')?0:t.includes('petg')?200:t.includes('abs')?300:t.includes('tpu')?400:900;
            const getId = (pre) => {
                const off = getOff(normType); const rng = inventory.filter(i=>i.id.startsWith(pre)).map(i=>parseInt(i.id.substring(1))).filter(n=>n>=off && n<=off+99);
                return pre + String((rng.length?Math.max(...rng):off)+1).padStart(3,'0');
            }
            if(normBrand.includes('bambu')) return getId('B');
            if(normBrand.includes('sunlu')) return getId('S');
            const nums = inventory.filter(i=>/^\d+$/.test(i.id)).map(i=>parseInt(i.id));
            const blk = nums.length ? Math.max(...nums.map(n=>Math.floor(n/100))) : 0;
            return String((blk+1)*100).padStart(4,'0');
        }

        // Export/Import
        function exportData() {
            const blob = new Blob([JSON.stringify({inventory, mapping:brandMapping, settings:columnSettings})], {type:"application/json"});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="backup.json"; a.click();
        }
        function readImportFile(inputElement) { 
            const file = inputElement.files[0]; 
            if(!file) return; 
            
            const reader = new FileReader(); 
            reader.onload = (e) => { 
                try {
                    const data = JSON.parse(e.target.result);
                    // Wir speichern alles in der Variable
                    pendingImportData = data; 
                    
                    // UI Logik: Modal öffnen
                    closeAllModals(); 
                    document.getElementById('sidebar').classList.remove('open'); // Sidebar sicher schließen
                    document.getElementById('overlay').classList.add('show');
                    document.getElementById('importModal').classList.add('show'); 
                } catch(err) {
                    alert("Fehler beim Lesen der Datei: " + err);
                }
            }; 
            reader.readAsText(file); 
        }

        function confirmOverwrite() { 
            if (!pendingImportData) return;

            // 1. Daten extrahieren (unterstützt altes Array-Format und neues Objekt-Format)
            let newInventory = [];
            if (Array.isArray(pendingImportData)) {
                newInventory = pendingImportData;
            } else if (pendingImportData.inventory) {
                newInventory = pendingImportData.inventory;
                // Settings & Mapping auch wiederherstellen, falls vorhanden
                if (pendingImportData.mapping) {
                    brandMapping = pendingImportData.mapping;
                    localStorage.setItem(MAPPING_KEY, JSON.stringify(brandMapping));
                }
                if (pendingImportData.settings) {
                    columnSettings = pendingImportData.settings;
                    saveSettings();
                }
            }

            // 2. Historie sicherstellen (Migration für alte Daten)
            newInventory.forEach(item => {
                if (!item.history) {
                    item.history = [{ 
                        date: new Date().toISOString(), 
                        amount: item.count || 0, 
                        note: "Import (Overwrite)" 
                    }];
                }
                // Count neu berechnen zur Sicherheit
                item.count = getCurrentCount(item);
            });

            // 3. Speichern
            inventory = newInventory;
            saveData(); 
            
            // 4. UI Aktualisieren
            renderHeaders(); // Falls Settings importiert wurden
            renderTable(); 
            updateAutocompleteLists(); 
            closeAllModals(); 
            alert("Daten erfolgreich überschrieben!");
        }

        function confirmMerge() { 
            if (!pendingImportData) return;

            // Datenquelle bestimmen
            const sourceInventory = Array.isArray(pendingImportData) ? pendingImportData : pendingImportData.inventory;
            
            if (!sourceInventory) {
                alert("Keine Inventar-Daten gefunden.");
                return;
            }

            let added = 0;
            let merged = 0;

            sourceInventory.forEach(newItem => {
                // Menge des importierten Items ermitteln
                let importAmount = newItem.count;
                // Falls Historie existiert, rechnen wir lieber nach
                if (newItem.history && Array.isArray(newItem.history)) {
                    importAmount = newItem.history.reduce((sum, h) => sum + h.amount, 0);
                }

                // Nichts tun, wenn Menge 0 ist (optional, aber sauberer)
                if (importAmount === 0 && (!newItem.history || newItem.history.length === 0)) return;

                // Existierenden Eintrag suchen (Matching über Eigenschaften)
                const existingIndex = inventory.findIndex(item => 
                    normalizeBrand(item.brand) === normalizeBrand(newItem.brand) &&
                    item.type.toLowerCase() === newItem.type.toLowerCase() &&
                    item.color.toLowerCase() === newItem.color.toLowerCase() &&
                    (item.info || "").toLowerCase() === (newItem.info || "").toLowerCase() &&
                    item.weight === newItem.weight &&
                    item.sample === newItem.sample
                );

                if (existingIndex > -1) {
                    // FALL 1: Existiert -> Menge addieren
                    // Wir fügen einen Historien-Eintrag hinzu, der die importierte Gesamtmenge repräsentiert
                    addHistoryEntry(inventory[existingIndex], importAmount, "Import (Merge)");
                    merged++;
                } else {
                    // FALL 2: Neu anlegen
                    
                    // a) Historie sauber initialisieren
                    // Wir übernehmen NICHT die alte Historie 1:1, da dies zu Datumskonflikten führen könnte,
                    // sondern starten mit einem Initial-Eintrag der aktuellen Menge.
                    newItem.history = [{
                        date: new Date().toISOString(),
                        amount: importAmount,
                        note: "Import (Neu)"
                    }];
                    
                    // b) ID Konflikte lösen
                    // Wenn die ID schon vergeben ist, berechnen wir eine neue
                    if (inventory.some(e => e.id === newItem.id)) {
                        newItem.id = calculateNextId(newItem.brand, newItem.type);
                        // Falls die Berechnung zufällig auch kollidiert (sehr selten):
                        if (inventory.some(e => e.id === newItem.id)) {
                            newItem.id += "_" + Math.floor(Math.random() * 1000);
                        }
                    }

                    // c) Count Feld syncen
                    newItem.count = importAmount;
                    
                    inventory.push(newItem);
                    added++;
                }
            });

            saveData(); 
            renderTable(); 
            updateAutocompleteLists(); 
            closeAllModals(); 
            
            alert(`Import abgeschlossen:\n${merged} Filamente zusammengeführt (Menge addiert)\n${added} neue Filamente hinzugefügt.`);
        }

        // History Display
        function showHistory(idx) {
            const item = inventory[idx];
            document.getElementById('historyTitle').innerText = `${item.brand} ${item.type}`;
            document.getElementById('historyTableBody').innerHTML = item.history.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>`<tr><td>${new Date(h.date).toLocaleDateString()}</td><td>${h.amount}</td><td>${h.note}</td></tr>`).join('');
            document.getElementById('historyModal').classList.add('show'); document.getElementById('overlay').classList.add('show');
        }
        // Save Mapping Editor
        function saveMappingFromEditor() { try { brandMapping=JSON.parse(document.getElementById('mappingEditorText').value); localStorage.setItem(MAPPING_KEY,JSON.stringify(brandMapping)); closeAllModals(); } catch(e){alert("JSON Error");} }
        function openMappingEditor() { closeAllModals(); document.getElementById('mappingModal').classList.add('show'); document.getElementById('overlay').classList.add('show'); document.getElementById('mappingEditorText').value=JSON.stringify(brandMapping,null,2); }
    </script>
