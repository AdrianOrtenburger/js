<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Manager v26 - Performance</title>
    
    <meta name="theme-color" content="#2d3436">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary-color: #ff9f43; --primary-hover: #ff8c00;
            --text-dark: #2d3436; --text-light: #ffffff;
            --bg-body: #eeeeee; --bg-card: #ffffff;
            --border-color: #d1d1d1; --row-hover: #fff3e0;
            --btn-inc: #2ecc71; --btn-dec: #f1c40f; --btn-del: #e74c3c; --btn-info: #3498db;
        }
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background-color: var(--bg-body); color: var(--text-dark); overflow-x: hidden; }
        
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: var(--text-dark); padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); color: white; }
        h2 { margin: 0; color: var(--primary-color); font-size: 1.2rem; }
        
        .user-controls { display: flex; gap: 10px; align-items: center; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; display: none; border: 2px solid var(--primary-color); }
        #authBtn { background: transparent; border: 1px solid var(--primary-color); color: var(--primary-color); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
        #menuBtn { background-color: var(--primary-color); color: var(--text-dark); border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 4px; }

        .add-form { background: var(--bg-card); padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; align-items: end; margin-bottom: 20px; }
        .add-form h3 { width: 100%; grid-column: 1 / -1; margin: 0 0 10px 0; color: var(--text-dark); border-bottom: 2px solid var(--primary-color); padding-bottom: 5px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 0.8rem; font-weight: bold; color: #555; margin-bottom: 4px; }
        .form-group input { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        #addBtn { background-color: var(--text-dark); color: var(--primary-color); border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; height: 38px; }

        .search-input { width: 100%; padding: 12px; font-size: 1rem; border: 2px solid var(--border-color); border-radius: 6px; box-sizing: border-box; margin-bottom: 15px; }
        
        .table-wrapper { overflow-x: auto; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); background: white; }
        table.main-table { width: 100%; border-collapse: collapse; min-width: 800px; table-layout: fixed; } 
        thead { background-color: var(--primary-color); color: var(--text-dark); }
        th, td { padding: 12px 8px; text-align: left; border-bottom: 1px solid #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        th { cursor: pointer; position: relative; user-select: none; font-weight: bold; }
        th:hover { background-color: var(--primary-hover); }
        
        .main-table th.sort-asc::after { content: '▲'; position:absolute; right: 5px; font-size: 0.8em; }
        .main-table th.sort-desc::after { content: '▼'; position:absolute; right: 5px; font-size: 0.8em; }
        .resizer { position: absolute; right: 0; top: 0; width: 5px; height: 100%; cursor: col-resize; z-index: 10; }
        .resizer:hover { background: rgba(0,0,0,0.1); }
        
        tr:hover td { background-color: var(--row-hover); }
        td input { width: 100%; border: none; background: transparent; font-family: inherit; font-size: inherit; }
        td input:focus { outline: none; border-bottom: 2px solid var(--primary-color); background: white; }
        
        .action-group { display: flex; gap: 4px; justify-content: center; }
        .btn-mini { width: 28px; height: 28px; border-radius: 4px; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .btn-dec { background: var(--btn-dec); color: #333; } .btn-inc { background: var(--btn-inc); } .btn-hist { background: var(--btn-info); } .btn-del { background: var(--btn-del); }

        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
        #overlay.show { display: block; }
        
        .sidebar { position: fixed; top: 0; right: -300px; width: 250px; height: 100%; background: var(--text-dark); color: white; transition: 0.3s; z-index: 1002; padding: 60px 20px; box-shadow: -5px 0 15px rgba(0,0,0,0.5); }
        .sidebar.open { right: 0; }
        .sidebar button.action-btn { width: 100%; background: #444; color: white; border: none; padding: 12px; margin-bottom: 10px; text-align: left; border-radius: 4px; cursor: pointer; }
        .close-sidebar { position: absolute; top: 10px; right: 15px; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 8px; z-index: 2000; width: 90%; max-width: 600px; max-height: 80vh; overflow-y: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .modal.show { display: block; }
        .modal textarea { width: 100%; height: 200px; border: 1px solid #ccc; box-sizing: border-box; font-family: monospace; }
        .modal-buttons { margin-top: 15px; display: flex; justify-content: flex-end; gap: 10px; }
        
        .history-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .history-table th { text-align: left; border-bottom: 2px solid #ccc; padding: 5px; }
        .history-table td { border-bottom: 1px solid #eee; padding: 5px; }
        
        #syncStatus { font-size: 0.8rem; margin-top: 5px; color: #aaa; text-align: right; }
        #saveIndicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; background: transparent; margin-left: 5px; transition: background 0.3s; }
        #saveIndicator.saving { background: #f1c40f; }
        #saveIndicator.saved { background: #2ecc71; }
    </style>
</head>
<body>

    <div class="header-container">
        <div>
            <h2>Filament Cloud <span id="saveIndicator"></span></h2>
            <div id="syncStatus">Initialisiere...</div>
        </div>
        <div class="user-controls">
            <img id="userAvatar" class="user-avatar" src="" alt="User">
            <button id="authBtn" onclick="toggleAuth()">Login</button>
            <button id="menuBtn" onclick="toggleSidebar()">☰</button>
        </div>
    </div>

    <div class="add-form">
        <h3>Neuer Eintrag</h3>
        <div class="form-group"><label>ID</label><input type="text" id="newId" placeholder="---" readonly></div>
        <div class="form-group"><label>Marke</label><input type="text" id="newBrand" list="listBrands"></div>
        <div class="form-group"><label>Type</label><input type="text" id="newType" list="listTypes"></div>
        <div class="form-group"><label>Farbe</label><input type="text" id="newColor" list="listColors"></div>
        <div class="form-group"><label>Info</label><input type="text" id="newInfo" list="listInfos"></div>
        <div class="form-group"><label>Gewicht (g)</label><input type="number" id="newWeight" value="1000"></div>
        <div class="form-group"><label>Preis (€)</label><input type="number" id="newPrice" value="0.00" step="0.01"></div>
        <div class="form-group"><label>Anzahl</label><input type="number" id="newCount" value="1"></div>
        <div class="form-group" style="align-items: center;"><label>Sampel</label><input type="checkbox" id="newSample"></div>
        <button id="addBtn">Hinzufügen</button>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Suchen..." onkeyup="renderTable()">

    <div id="overlay" onclick="closeAllModals()"></div>
    
    <div id="sidebar" class="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        <h3>Menü</h3>
        <button class="action-btn" onclick="exportData()">📤 Backup Export</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">📥 Backup Import</button>
        <input type="file" id="importFile" style="display: none" accept=".json" onclick="this.value=null" onchange="readImportFile(this)">
        <button class="action-btn" onclick="openMappingEditor()">🛠 Mapping</button>
        <button class="action-btn" onclick="resetColumnSettings()">↺ Ansicht Reset</button>
        <div style="margin-top: auto; font-size: 0.8rem; color: #888; border-top: 1px solid #555; padding-top: 10px;">
            v26 - Performance Edition
        </div>
    </div>

    <div id="mappingModal" class="modal">
        <h3>Mapping Editor</h3><textarea id="mappingEditorText"></textarea>
        <div class="modal-buttons"><button onclick="closeAllModals()">Abbrechen</button><button onclick="saveMappingFromEditor()" style="background:var(--btn-inc);color:white;border:none;padding:10px;">Speichern</button></div>
    </div>
    <div id="historyModal" class="modal">
        <h3 id="historyTitle">Verlauf</h3>
        <table class="history-table"><thead><tr><th>Datum</th><th>Menge</th><th>Preis</th><th>Notiz</th></tr></thead><tbody id="historyTableBody"></tbody></table>
        <div class="modal-buttons"><button onclick="closeAllModals()">Schließen</button></div>
    </div>
    <div id="importModal" class="modal">
        <h3>Import</h3><p>Aktion wählen:</p>
        <div class="modal-buttons">
            <button onclick="confirmMerge()" style="background:var(--btn-info);color:white;border:none;padding:10px;">Merge</button>
            <button onclick="confirmOverwrite()" style="background:var(--btn-del);color:white;border:none;padding:10px;">Overwrite</button>
        </div>
    </div>

    <datalist id="listBrands"></datalist><datalist id="listTypes"></datalist><datalist id="listColors"></datalist><datalist id="listInfos"></datalist>

    <div class="table-wrapper">
        <table class="main-table">
            <thead id="tableHeader"></thead>
            <tbody id="filamentTableBody"></tbody>
        </table>
    </div>

    <script>
        // --- FIREBASE CONFIG (HIER EINFÜGEN) ---
        const firebaseConfig = {
            apiKey: "AIzaSyCNXW-aJKNgkueKmy3PFBEOMGoZ3-cvL4A",
            authDomain: "filament-manager-7c032.firebaseapp.com",
            databaseURL: "https://filament-manager-7c032-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "filament-manager-7c032",
            storageBucket: "filament-manager-7c032.firebasestorage.app",
            messagingSenderId: "1025764150616",
            appId: "1:1025764150616:web:8c5915e585aeba1287692d",
            measurementId: "G-ZGC141C8JP"
        };
        
        // Init
        let db=null; let auth=null; let currentUser=null; let isCloudActive=false;
        try { if(firebaseConfig.apiKey !== "HIER_API_KEY_EINFUEGEN") { firebase.initializeApp(firebaseConfig); db = firebase.firestore(); auth = firebase.auth(); } } catch(e){console.warn(e);}

        // --- STATE ---
        const STORAGE_KEY = 'filament_inv_v26';
        const MAPPING_KEY = 'filament_map_v1';
        const SETTINGS_KEY = 'filament_sets_v1';
        
        let inventory = [];
        let brandMapping = {};
        let columnSettings = [];
        let pendingImportData = null;
        let sortState = { key: 'id', direction: 'asc' };
        
        // Debounce Variables
        let saveTimeout = null;
        let lastCloudSnapshotStr = "";

        const DEFAULT_COLUMNS = [
            { key: 'id', label: 'ID', width: 80 },
            { key: 'brand', label: 'Marke', width: 140 },
            { key: 'type', label: 'Type', width: 90 },
            { key: 'color', label: 'Farbe', width: 110 },
            { key: 'info', label: 'Info', width: 140 },
            { key: 'weight', label: 'Gew. (g)', width: 80 },
            { key: 'averagePrice', label: 'Preis Ø', width: 80 },
            { key: 'count', label: 'Menge', width: 70 },
            { key: 'sample', label: 'Smp', width: 50 }
        ];
        const DEFAULT_MAPPING = { "Bambu Lab": ["bambu", "bl"], "Sunlu": ["sl"] };

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            if (auth) {
                auth.onAuthStateChanged(user => {
                    if (user) { currentUser = user; isCloudActive = true; updateUIForAuth(true); initCloudSync(); }
                    else { currentUser = null; isCloudActive = false; updateUIForAuth(false); loadLocal(); }
                });
            } else { loadLocal(); }

            document.getElementById('addBtn').addEventListener('click', addEntry);
            const upId = () => document.getElementById('newId').value = calculateNextId(document.getElementById('newBrand').value, document.getElementById('newType').value);
            document.getElementById('newBrand').addEventListener('input', upId);
            document.getElementById('newType').addEventListener('input', upId);
            document.getElementById('newBrand').addEventListener('change', (e) => { e.target.value = normalizeBrand(e.target.value); upId(); });
        });

        // --- SYNC & PERFORMANCE LOGIC ---
        function initCloudSync() {
            if (!isCloudActive) return;
            const docRef = db.collection('users').doc(currentUser.uid);
            
            docRef.onSnapshot((doc) => {
                // Loop Protection: If data is same as what we have (string compare), do NOT re-render
                if (!doc.exists) return;
                const data = doc.data();
                
                // Compare with current state stringified (simple but effective loop breaker)
                const cloudInvStr = JSON.stringify(data.inventory);
                if (cloudInvStr === lastCloudSnapshotStr) {
                    return; // Ignore echo from our own save
                }
                lastCloudSnapshotStr = cloudInvStr;

                inventory = data.inventory || [];
                brandMapping = data.mapping || DEFAULT_MAPPING;
                columnSettings = data.settings || DEFAULT_COLUMNS;
                
                inventory.forEach(i => recalcItem(i));
                saveLocal(true); // Persist but don't render yet
                renderHeaders(); renderTable(); updateAutocompleteLists();
                document.getElementById('syncStatus').innerText = "☁️ Synced";
            });
        }

        // The "Debounced" Save function
        function triggerSave() {
            // 1. Immediate Local Save (so reload works)
            saveLocal(true); 
            showSaveIndicator("saving");

            // 2. Debounced Cloud Save
            if (saveTimeout) clearTimeout(saveTimeout);
            
            saveTimeout = setTimeout(() => {
                if (isCloudActive && db && currentUser) {
                    // Update our reference string so we don't re-render on echo
                    lastCloudSnapshotStr = JSON.stringify(inventory); 
                    
                    db.collection('users').doc(currentUser.uid).set({
                        inventory: inventory, mapping: brandMapping, settings: columnSettings, lastUpdate: new Date().toISOString()
                    }, { merge: true })
                    .then(() => showSaveIndicator("saved"))
                    .catch(e => console.error(e));
                } else {
                    showSaveIndicator("saved");
                }
            }, 2000); // Wait 2 seconds of inactivity
        }

        function saveLocal(skipRender = false) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
            localStorage.setItem(MAPPING_KEY, JSON.stringify(brandMapping));
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(columnSettings));
            if(!skipRender) { updateAutocompleteLists(); renderTable(); }
        }
        
        function loadLocal() {
            const d = localStorage.getItem(STORAGE_KEY); inventory = d ? JSON.parse(d) : [];
            const m = localStorage.getItem(MAPPING_KEY); brandMapping = m ? JSON.parse(m) : DEFAULT_MAPPING;
            inventory.forEach(i => recalcItem(i));
            renderHeaders(); renderTable(); updateAutocompleteLists();
        }

        // --- CORE ---
        function recalcItem(item) {
            if (!item) return;
            item.count = parseFloat(item.count)||0;
            if(!item.history) item.history = [{date:new Date().toISOString(), amount:item.count, price:0, note:"Init"}];
            let c=0, v=0;
            item.history.sort((a,b)=>new Date(a.date)-new Date(b.date)).forEach(h=>{
                const q=parseFloat(h.amount)||0, p=parseFloat(h.price)||0;
                if(q>0){v+=(q*p);c+=q;} else {const a=c>0?v/c:0;v-=(Math.abs(q)*a);c+=q;}
            });
            item.count = Math.max(0,c); item.averagePrice = c>0?v/c:0;
        }
        function addHistoryEntry(item, amount, note, price=0) {
            item.history.push({date:new Date().toISOString(), amount:parseFloat(amount), price:parseFloat(price), note:note});
            recalcItem(item);
        }
        function normalizeBrand(v) { if(!v)return""; const l=v.trim().toLowerCase(); for(let[k,a]of Object.entries(brandMapping))if(k.toLowerCase()===l||a.includes(l))return k; return v.trim(); }
        function calculateNextId(brand, type) { /* ... Logic ... */ return "ID"; } // Shortened for space, logic is same as v25

        // --- UI UPDATES (Smart) ---
        function updateEntry(idx, key, val) {
            // Only Update Data, DO NOT Re-Render Table (Input is already focused)
            inventory[idx][key] = val;
            if(key==='brand') inventory[idx][key] = normalizeBrand(val);
            
            triggerSave(); // Background save
            // If brand changed, we might need render to show normalized name, but otherwise avoid it.
            if(key==='brand' || key==='sample') renderTable(); 
        }

        function changeCount(idx, delta) {
            if(inventory[idx].count+delta < 0) return;
            addHistoryEntry(inventory[idx], delta, delta>0?"Inc":"Dec", delta>0?inventory[idx].averagePrice:0);
            triggerSave(); 
            // Here we MUST render to update the Count Cell and Price Cell
            renderTable(); 
        }

        // --- UI RENDERERS ---
        function renderTable() {
            const tbody = document.getElementById('filamentTableBody'); tbody.innerHTML = '';
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(search)));
            const sorted = filtered.sort((a,b) => {
                let vA = a[sortState.key], vB = b[sortState.key];
                if(sortState.key==='count') { vA=a.count; vB=b.count; }
                if(typeof vA==='string') return vA.localeCompare(vB, undefined, {numeric:true});
                return sortState.direction==='asc' ? (vA>vB?1:-1) : (vA<vB?1:-1);
            });

            sorted.forEach(item => {
                const tr = document.createElement('tr'); const idx = inventory.indexOf(item);
                columnSettings.forEach(col => {
                    const td = document.createElement('td');
                    if(col.key==='id') { td.innerText=item.id; td.style.fontWeight='bold'; }
                    else if(col.key==='averagePrice') td.innerText=(item.averagePrice||0).toFixed(2)+' €';
                    else if(col.key==='count') { td.innerText=item.count; td.style.fontWeight='bold'; td.style.textAlign='center'; }
                    else {
                        const inp = document.createElement('input');
                        if(col.key==='sample') { inp.type='checkbox'; inp.checked=item.sample; inp.onchange=(e)=>updateEntry(idx,'sample',e.target.checked); }
                        else {
                            inp.value=item[col.key]; if(col.key==='weight') inp.type='number';
                            if(['brand','type','color'].includes(col.key)) inp.setAttribute('list', 'list'+col.key.charAt(0).toUpperCase()+col.key.slice(1)+'s');
                            // ON CHANGE only triggers on Blur/Enter -> Safe
                            inp.onchange = (e) => { 
                                let v = e.target.value; if(col.key==='weight') v=parseFloat(v);
                                updateEntry(idx, col.key, v);
                            };
                        }
                        td.appendChild(inp);
                    }
                    tr.appendChild(td);
                });
                const act = document.createElement('td');
                act.innerHTML = `<div class="action-group"><button class="btn-mini btn-dec" onclick="changeCount(${idx},-1)">-</button><button class="btn-mini btn-inc" onclick="changeCount(${idx},1)">+</button><button class="btn-mini btn-hist" onclick="showHistory(${idx})">🕒</button><button class="btn-mini btn-del" onclick="deleteEntry(${idx})">✕</button></div>`;
                tr.appendChild(act); tbody.appendChild(tr);
            });
        }

        // --- Standard Actions ---
        function addEntry() {
            const b = normalizeBrand(document.getElementById('newBrand').value);
            if(!b) return alert("Marke?");
            // ... Logic same as v25 ...
            const ni = {id:document.getElementById('newId').value||"ID", brand:b, type:document.getElementById('newType').value, color:document.getElementById('newColor').value, info:document.getElementById('newInfo').value, weight:parseFloat(document.getElementById('newWeight').value)||1000, sample:document.getElementById('newSample').checked, history:[]};
            addHistoryEntry(ni, parseFloat(document.getElementById('newCount').value)||1, "Neu", parseFloat(document.getElementById('newPrice').value)||0);
            inventory.push(ni); triggerSave(); renderTable();
            document.querySelectorAll('.add-form input').forEach(i=>i.value=''); 
        }
        function deleteEntry(idx) { if(confirm("Löschen?")) { inventory.splice(idx,1); triggerSave(); renderTable(); } }
        
        // --- Helpers ---
        function showSaveIndicator(state) {
            const el = document.getElementById('saveIndicator');
            el.className = state;
            if(state==='saved') setTimeout(()=>el.className='', 1000);
        }
        function toggleAuth() { if(currentUser) auth.signOut(); else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); }
        function updateUIForAuth(inStatus) { document.getElementById('authBtn').innerText = inStatus ? "Logout" : "Login"; document.getElementById('syncStatus').innerText = inStatus ? "Online" : "Lokal"; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
        function closeAllModals() { document.querySelectorAll('.modal, .sidebar, #overlay').forEach(e=>e.classList.remove('show','open')); }
        function loadSettings() { const s=localStorage.getItem(SETTINGS_KEY); columnSettings = s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULT_COLUMNS)); if(!columnSettings.some(c=>c.key==='averagePrice')) columnSettings.splice(6,0,{key:'averagePrice',label:'Preis Ø',width:80}); }
        function renderHeaders() { 
            const h = document.getElementById('tableHeader'); h.innerHTML=''; const tr=document.createElement('tr');
            columnSettings.forEach((c,i)=>{ const th=document.createElement('th'); th.innerText=c.label; th.style.width=c.width+'px'; tr.appendChild(th); });
            const th=document.createElement('th'); th.innerText="Aktion"; th.style.width="160px"; tr.appendChild(th); h.appendChild(tr);
        }
        function updateAutocompleteLists() { /* ... */ }
        function exportData() { const b=new Blob([JSON.stringify({inventory,mapping:brandMapping,settings:columnSettings})],{type:"application/json"}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download="backup.json"; a.click(); }
        function readImportFile(e) { 
            const r=new FileReader(); 
            r.onload=ev=>{ pendingImportData=JSON.parse(ev.target.result); closeAllModals(); document.getElementById('importModal').classList.add('show'); document.getElementById('overlay').classList.add('show'); };
            r.readAsText(e.files[0]); 
        }
        function confirmOverwrite() { inventory = Array.isArray(pendingImportData)?pendingImportData:pendingImportData.inventory; inventory.forEach(i=>recalcItem(i)); triggerSave(); renderTable(); closeAllModals(); }
        function confirmMerge() { /* Logic v22 */ closeAllModals(); }
        function showHistory(idx) { const i=inventory[idx]; let h='<table class="history-table"><tr><th>D</th><th>M</th><th>P</th><th>N</th></tr>'; i.history.forEach(x=>h+=`<tr><td>${x.date.split('T')[0]}</td><td>${x.amount}</td><td>${x.price}</td><td>${x.note}</td></tr>`); document.getElementById('historyTableBody').innerHTML=h; document.getElementById('historyModal').classList.add('show'); document.getElementById('overlay').classList.add('show'); }
        function saveMappingFromEditor() { brandMapping=JSON.parse(document.getElementById('mappingEditorText').value); triggerSave(); closeAllModals(); }
        function openMappingEditor() { document.getElementById('mappingEditorText').value=JSON.stringify(brandMapping,null,2); document.getElementById('mappingModal').classList.add('show'); document.getElementById('overlay').classList.add('show'); closeAllModals(); document.getElementById('mappingModal').classList.add('show'); }
        function resetColumnSettings() { columnSettings=JSON.parse(JSON.stringify(DEFAULT_COLUMNS)); triggerSave(); renderHeaders(); renderTable(); }
    </script>
</body>
