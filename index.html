<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Filament Manager v28 - Auto-ID Import</title>

    <meta name="theme-color" content="#2d3436">

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --primary-color: #ff9f43;
            --primary-hover: #ff8c00;
            --text-dark: #2d3436;
            --text-light: #ffffff;
            --bg-body: #eeeeee;
            --bg-card: #ffffff;
            --border-color: #d1d1d1;
            --row-hover: #fff3e0;
            --btn-inc: #2ecc71;
            --btn-dec: #f1c40f;
            --btn-del: #e74c3c;
            --btn-info: #3498db;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            background-color: var(--bg-body);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Layout */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            background: var(--text-dark);
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            color: white;
        }

        h2 {
            margin: 0;
            color: var(--primary-color);
            font-size: 1.2rem;
        }

        .user-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: none;
            border: 2px solid var(--primary-color);
        }

        #authBtn {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        #menuBtn {
            background-color: var(--primary-color);
            color: var(--text-dark);
            border: none;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .add-form {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            align-items: end;
            margin-bottom: 20px;
        }

        .add-form h3 {
            width: 100%;
            grid-column: 1 / -1;
            margin: 0 0 10px 0;
            color: var(--text-dark);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: bold;
            color: #555;
            margin-bottom: 4px;
        }

        .form-group input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #addBtn {
            background-color: var(--text-dark);
            color: var(--primary-color);
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
            height: 38px;
        }

        .search-input {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            background: white;
        }

        table.main-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
            table-layout: fixed;
        }

        thead {
            background-color: var(--primary-color);
            color: var(--text-dark);
        }

        th,
        td {
            padding: 12px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        th {
            cursor: pointer;
            position: relative;
            user-select: none;
            font-weight: bold;
        }

        th:hover {
            background-color: var(--primary-hover);
        }

        .main-table th.sort-asc::after {
            content: '▲';
            position: absolute;
            right: 5px;
            font-size: 0.8em;
        }

        .main-table th.sort-desc::after {
            content: '▼';
            position: absolute;
            right: 5px;
            font-size: 0.8em;
        }

        .resizer {
            position: absolute;
            right: 0;
            top: 0;
            width: 5px;
            height: 100%;
            cursor: col-resize;
            z-index: 10;
        }

        .resizer:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        tr:hover td {
            background-color: var(--row-hover);
        }

        td input {
            width: 100%;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: inherit;
        }

        td input:focus {
            outline: none;
            border-bottom: 2px solid var(--primary-color);
        }

        .action-group {
            display: flex;
            gap: 4px;
            justify-content: center;
        }

        .btn-mini {
            width: 28px;
            height: 28px;
            border-radius: 4px;
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .btn-dec {
            background: var(--btn-dec);
            color: #333;
        }

        .btn-inc {
            background: var(--btn-inc);
        }

        .btn-hist {
            background: var(--btn-info);
        }

        .btn-del {
            background: var(--btn-del);
        }

        /* Sidebar & Modals */
        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        #overlay.show {
            display: block;
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: var(--text-dark);
            color: white;
            transition: 0.3s;
            z-index: 1002;
            padding: 60px 20px;
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.5);
        }

        .sidebar.open {
            right: 0;
        }

        .sidebar button.action-btn {
            width: 100%;
            background: #444;
            color: white;
            border: none;
            padding: 12px;
            margin-bottom: 10px;
            text-align: left;
            border-radius: 4px;
            cursor: pointer;
        }

        .close-sidebar {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 20px;
            border-radius: 8px;
            z-index: 2000;
            width: 90%;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .modal.show {
            display: block;
        }

        .modal textarea {
            width: 100%;
            height: 200px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            font-family: monospace;
        }

        .modal-buttons {
            margin-top: 15px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .history-table th {
            text-align: left;
            border-bottom: 2px solid #ccc;
            padding: 5px;
        }

        .history-table td {
            border-bottom: 1px solid #eee;
            padding: 5px;
        }

        #syncStatus {
            font-size: 0.8rem;
            margin-top: 5px;
            color: #aaa;
            text-align: right;
        }
    </style>
</head>

<body>

    <div class="header-container">
        <div>
            <h2>Filament Cloud</h2>
            <div id="syncStatus">Offline (LocalStorage)</div>
        </div>
        <div class="user-controls">
            <img id="userAvatar" class="user-avatar" src="" alt="User">
            <button id="authBtn" onclick="toggleAuth()">Login</button>
            <button id="menuBtn" onclick="toggleSidebar()">☰</button>
        </div>
    </div>

    <div class="add-form">
        <div class="form-group"><label>Marke</label><input type="text" id="newBrand" list="listBrands"></div>
        <div class="form-group"><label>Type</label><input type="text" id="newType" list="listTypes"></div>
        <div class="form-group"><label>Farbe</label><input type="text" id="newColor" list="listColors"></div>
        <div class="form-group"><label>Info</label><input type="text" id="newInfo" list="listInfos"></div>
        <div class="form-group"><label>Gewicht (g)</label><input type="number" id="newWeight" value="1000"></div>
        <div class="form-group"><label>Preis (€)</label><input type="number" id="newPrice" value="0.00" step="0.01">
        </div>
        <div class="form-group"><label>Anzahl</label><input type="number" id="newCount" value="1"></div>
        <div class="form-group" style="align-items: center;"><label>Sampel</label><input type="checkbox" id="newSample">
        </div>
        <button id="addBtn">Hinzufügen</button>
    </div>

    <input type="text" id="searchInput" class="search-input" placeholder="🔍 Suchen..." onkeyup="renderTable()">

    <div id="overlay" onclick="closeAllModals()"></div>

    <div id="sidebar" class="sidebar">
        <button class="close-sidebar" onclick="toggleSidebar()">×</button>
        <h3>Menü</h3>
        <button class="action-btn" onclick="exportData()">📤 Backup Export (JSON)</button>
        <button class="action-btn" onclick="document.getElementById('importFile').click()">📥 Backup Import</button>
        <input type="file" id="importFile" style="display: none" accept=".json" onclick="this.value=null"
            onchange="readImportFile(this)">
        <button class="action-btn" onclick="openMappingEditor()">🛠 Mapping</button>
        <button class="action-btn" onclick="resetColumnSettings()">↺ Ansicht Reset</button>
    </div>

    <div id="mappingModal" class="modal">
        <h3>Mapping Editor</h3><textarea id="mappingEditorText"></textarea>
        <div class="modal-buttons"><button onclick="closeAllModals()">Abbrechen</button><button
                onclick="saveMappingFromEditor()"
                style="background:var(--btn-inc);color:white;border:none;padding:10px;">Speichern</button></div>
    </div>
    <div id="historyModal" class="modal">
        <h3 id="historyTitle">Verlauf</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>Datum</th>
                    <th>Menge</th>
                    <th>Preis</th>
                    <th>Notiz</th>
                </tr>
            </thead>
            <tbody id="historyTableBody"></tbody>
        </table>
        <div class="modal-buttons"><button onclick="closeAllModals()">Schließen</button></div>
    </div>
    <div id="importModal" class="modal">
        <h3>Import</h3>
        <p>Aktion wählen:</p>
        <div class="modal-buttons">
            <button onclick="confirmMerge()"
                style="background:var(--btn-info);color:white;border:none;padding:10px;">Merge</button>
            <button onclick="confirmOverwrite()"
                style="background:var(--btn-del);color:white;border:none;padding:10px;">Overwrite</button>
        </div>
    </div>

    <datalist id="listBrands"></datalist><datalist id="listTypes"></datalist><datalist
        id="listColors"></datalist><datalist id="listInfos"></datalist>

    <div class="table-wrapper">
        <table class="main-table">
            <thead id="tableHeader"></thead>
            <tbody id="filamentTableBody"></tbody>
        </table>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCNXW-aJKNgkueKmy3PFBEOMGoZ3-cvL4A",
            authDomain: "filament-manager-7c032.firebaseapp.com",
            projectId: "filament-manager-7c032",
            storageBucket: "filament-manager-7c032.firebasestorage.app",
            messagingSenderId: "1025764150616",
            appId: "1:1025764150616:web:8c5915e585aeba1287692d",
            measurementId: "G-ZGC141C8JP"
        };

        // Init Firebase
        let db = null; let auth = null; let currentUser = null; let isCloudActive = false;
        try {
            if (firebaseConfig.apiKey !== "HIER_API_KEY_EINFUEGEN") {
                firebase.initializeApp(firebaseConfig);
                db = firebase.firestore();
                auth = firebase.auth();
                db.enablePersistence().catch(err => console.log("Persistence error", err));
            }
        } catch (e) { console.warn("Firebase Error", e); }

        // --- STATE ---
        const STORAGE_KEY = 'filament_inventory_v28';
        const MAPPING_KEY = 'filament_mapping_v1';
        const SETTINGS_KEY = 'filament_settings_v1';

        let inventory = [];
        let brandMapping = {};
        let columnSettings = [];
        let pendingImportData = null;
        let sortState = { key: 'id', direction: 'asc' };

        const DEFAULT_COLUMNS = [
            { key: 'id', label: 'ID', width: 80 },
            { key: 'brand', label: 'Marke', width: 140 },
            { key: 'type', label: 'Type', width: 90 },
            { key: 'color', label: 'Farbe', width: 110 },
            { key: 'info', label: 'Info', width: 140 },
            { key: 'weight', label: 'Gew. (g)', width: 80 },
            { key: 'averagePrice', label: 'Preis Ø', width: 80 },
            { key: 'count', label: 'Menge', width: 70 },
            { key: 'sample', label: 'Smp', width: 50 }
        ];
        const DEFAULT_MAPPING = { "Bambu Lab": ["bambu", "bl"], "Sunlu": ["sl"] };

        // --- INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();

            if (auth) {
                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUser = user; isCloudActive = true; updateUIForAuth(true); syncFromCloud();
                    } else {
                        currentUser = null; isCloudActive = false; updateUIForAuth(false); loadDataLocal();
                    }
                });
            } else { loadDataLocal(); }

            // Listeners
            document.getElementById('addBtn').addEventListener('click', addEntry);
            document.getElementById('newBrand').addEventListener('change', (e) => { 
                e.target.value = normalizeBrand(e.target.value); 
            });
        });

        // --- AUTH UI ---
        function toggleAuth() {
            if (!auth) return alert("Bitte Firebase Config im Code eintragen!");
            if (currentUser) auth.signOut();
            else auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e => alert(e.message));
        }
        function updateUIForAuth(loggedIn) {
            const btn = document.getElementById('authBtn'); const avatar = document.getElementById('userAvatar'); const status = document.getElementById('syncStatus');
            if (loggedIn) {
                btn.innerText = "Logout"; avatar.src = currentUser.photoURL; avatar.style.display = "block";
                status.innerText = "☁️ Online: " + currentUser.email; status.style.color = "#2ecc71";
            } else {
                btn.innerText = "Login"; avatar.style.display = "none";
                status.innerText = "🏠 Lokal"; status.style.color = "#aaa";
            }
        }

        // --- DATA SYNC ---
        function syncFromCloud() {
            if (!isCloudActive) return;
            
            db.collection('users').doc(currentUser.uid).onSnapshot((doc) => {
                if (doc.metadata.hasPendingWrites) return;

                if (doc.exists) {
                    const data = doc.data();
                    inventory = data.inventory || [];
                    brandMapping = data.mapping || DEFAULT_MAPPING;
                    columnSettings = data.settings || DEFAULT_COLUMNS;
                    
                    inventory.forEach(i => recalcItem(i));
                    
                    saveDataLocal(true); 
                    
                    renderHeaders();
                    renderTable();
                    updateAutocompleteLists();
                } else {
                    if (inventory.length === 0) loadDataLocal();
                }
            });
        }

        let saveTimer = null;

        function saveData() {
            const status = document.getElementById('syncStatus');
            if (isCloudActive) {
                status.innerText = "⏳ Sync pending...";
                status.style.color = "#f1c40f";
            }

            if (saveTimer) clearTimeout(saveTimer);

            saveTimer = setTimeout(() => {
                executeBackgroundSave();
            }, 2000);
        }

        function executeBackgroundSave() {
            saveDataLocal(true); 

            if (isCloudActive && db && currentUser) {
                db.collection('users').doc(currentUser.uid).set({
                    inventory: inventory,
                    mapping: brandMapping,
                    settings: columnSettings,
                    lastUpdate: new Date().toISOString()
                }, { merge: true })
                .then(() => {
                    const status = document.getElementById('syncStatus');
                    status.innerText = "☁️ Online: " + currentUser.email;
                    status.style.color = "#2ecc71";
                })
                .catch(e => console.error(e));
            }
        }

        function saveDataLocal(skipRender = true) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
            localStorage.setItem(MAPPING_KEY, JSON.stringify(brandMapping));
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(columnSettings));
            
            if (!skipRender) { 
                updateAutocompleteLists(); 
                renderTable(); 
            }
        }

        function loadDataLocal() {
            const data = localStorage.getItem(STORAGE_KEY);
            inventory = data ? JSON.parse(data) : [];
            const mapData = localStorage.getItem(MAPPING_KEY);
            brandMapping = mapData ? JSON.parse(mapData) : DEFAULT_MAPPING;
            inventory.forEach(i => recalcItem(i));
            renderHeaders(); renderTable(); updateAutocompleteLists();
        }

        // --- CORE LOGIC ---
        function recalcItem(item) {
            if (!item) return;
            item.count = parseFloat(item.count) || 0;
            if (!item.history || !Array.isArray(item.history)) item.history = [{ date: new Date().toISOString(), amount: item.count, price: 0, note: "Init" }];

            let totalCount = 0, totalValue = 0;
            [...item.history].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(e => {
                const qty = parseFloat(e.amount) || 0; const prc = parseFloat(e.price) || 0;
                if (qty > 0) { totalValue += (qty * prc); totalCount += qty; }
                else { const avg = totalCount > 0 ? totalValue / totalCount : 0; totalValue -= (Math.abs(qty) * avg); totalCount += qty; }
            });
            item.count = Math.max(0, totalCount);
            item.averagePrice = totalCount > 0 ? totalValue / totalCount : 0;
        }

        function addHistoryEntry(item, amount, note, price = 0) {
            if (!item.history) item.history = [];
            item.history.push({ date: new Date().toISOString(), amount: parseFloat(amount), price: parseFloat(price), note: note });
            recalcItem(item);
        }

        function normalizeBrand(inVal) {
            if (!inVal) return ""; const l = inVal.trim().toLowerCase();
            for (let [k, v] of Object.entries(brandMapping)) if (k.toLowerCase() === l || v.includes(l)) return k;
            return inVal.trim();
        }

        // --- ID LOGIK ---
        function calculateNextId(brand, type) {
            const cleanBrand = normalizeBrand(brand);
            const prefix = cleanBrand ? cleanBrand.charAt(0).toUpperCase() : 'X';
            const t = (type || "").toLowerCase();
            
            let start = 500, end = 9999; 
            if (t.includes('pla')) { start = 0; end = 199; }
            else if (t.includes('petg')) { start = 200; end = 299; }
            else if (t.includes('abs') || t.includes('asa')) { start = 300; end = 399; }
            else if (t.includes('tpu') || t.includes('flex')) { start = 400; end = 499; }

            const getNextInRange = (s, e) => {
                const existingIds = inventory
                    .filter(i => i.id.startsWith(prefix)) 
                    .map(i => parseInt(i.id.substring(1), 10)) 
                    .filter(n => !isNaN(n) && n >= s && n <= e);
                if (existingIds.length === 0) return s; 
                return Math.max(...existingIds) + 1;
            };

            let nextNum = getNextInRange(start, end);
            if (nextNum > end) nextNum = getNextInRange(500, 9999);

            return prefix + String(nextNum).padStart(3, '0');
        }

        // --- IMPORT LOGIC (FIXED) ---
        function readImportFile(inputElement) {
            const file = inputElement.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    pendingImportData = JSON.parse(e.target.result);
                    document.getElementById('sidebar').classList.remove('open');
                    document.getElementById('overlay').classList.add('show');
                    document.getElementById('importModal').classList.add('show');
                } catch (err) { alert("Datei Fehler: " + err); }
            };
            reader.readAsText(file);
        }

        function confirmOverwrite() {
            if (!pendingImportData) return alert("Keine Daten!");
            
            let newInv = [];
            // Format detection
            if (Array.isArray(pendingImportData)) newInv = pendingImportData;
            else if (pendingImportData.inventory) {
                newInv = pendingImportData.inventory;
                if (pendingImportData.mapping) brandMapping = pendingImportData.mapping;
                if (pendingImportData.settings) columnSettings = pendingImportData.settings;
            }
            
            // RESET INVENTORY FOR CLEAN IMPORT
            inventory = []; 

            // Process Items individually
            newInv.forEach(item => {
                // Ensure ID
                if (!item.id || item.id.trim() === "") {
                    item.id = calculateNextId(item.brand, item.type);
                }
                recalcItem(item);
                inventory.push(item);
            });

            saveData(); renderHeaders(); renderTable(); closeAllModals(); alert("Überschrieben!");
        }

        function confirmMerge() {
            if (!pendingImportData) return alert("Keine Daten!");
            const src = Array.isArray(pendingImportData) ? pendingImportData : pendingImportData.inventory;
            if (!src) return alert("Leer!");

            let m = 0, n = 0;
            src.forEach(newItem => {
                recalcItem(newItem);
                const amt = newItem.count;
                if (amt === 0 && (!newItem.history || newItem.history.length === 0)) return;
                const prc = newItem.averagePrice || 0;

                const idx = inventory.findIndex(i => normalizeBrand(i.brand) === normalizeBrand(newItem.brand) && i.type === newItem.type && i.color === newItem.color && i.weight === newItem.weight);

                if (idx > -1) {
                    addHistoryEntry(inventory[idx], amt, "Import Merge", prc); m++;
                } else {
                    // Check for missing ID or Collision
                    if (!newItem.id || inventory.some(e => e.id === newItem.id)) {
                        newItem.id = calculateNextId(newItem.brand, newItem.type);
                        if (inventory.some(e => e.id === newItem.id)) newItem.id += "_" + Math.floor(Math.random() * 100);
                    }
                    
                    newItem.history = [{ date: new Date().toISOString(), amount: amt, price: prc, note: "Import New" }];
                    recalcItem(newItem); 
                    inventory.push(newItem); 
                    n++;
                }
            });
            saveData(); renderTable(); closeAllModals(); alert(`Merge: ${m}, Neu: ${n}`);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify({ inventory, mapping: brandMapping, settings: columnSettings }, null, 2)], { type: "application/json" });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = "filament_backup.json"; a.click();
        }

        // --- UI RENDER & HELPERS ---
        function loadSettings() {
            const s = localStorage.getItem(SETTINGS_KEY);
            columnSettings = s ? JSON.parse(s) : JSON.parse(JSON.stringify(DEFAULT_COLUMNS));
            if (!columnSettings.some(c => c.key === 'averagePrice')) columnSettings.splice(6, 0, { key: 'averagePrice', label: 'Preis Ø', width: 80 });
        }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('show'); }
        function closeAllModals() {
            document.querySelectorAll('.modal, .sidebar, #overlay').forEach(e => e.classList.remove('show', 'open'));
            pendingImportData = null; document.getElementById('importFile').value = '';
        }

        function resetColumnSettings() { columnSettings = JSON.parse(JSON.stringify(DEFAULT_COLUMNS)); saveData(); renderHeaders(); renderTable(); }
        function saveMappingFromEditor() { try { brandMapping = JSON.parse(document.getElementById('mappingEditorText').value); saveData(); closeAllModals(); } catch (e) { alert("JSON Error"); } }
        function openMappingEditor() { closeAllModals(); document.getElementById('mappingModal').classList.add('show'); document.getElementById('overlay').classList.add('show'); document.getElementById('mappingEditorText').value = JSON.stringify(brandMapping, null, 2); }

        function renderHeaders() {
            const thead = document.getElementById('tableHeader'); thead.innerHTML = ''; const tr = document.createElement('tr');
            columnSettings.forEach((col, idx) => {
                const th = document.createElement('th'); th.innerText = col.label; th.style.width = col.width + 'px';
                th.draggable = true;
                th.addEventListener('dragstart', (e) => e.dataTransfer.setData('idx', idx));
                th.addEventListener('dragover', (e) => e.preventDefault());
                th.addEventListener('drop', (e) => {
                    const from = e.dataTransfer.getData('idx');
                    columnSettings.splice(idx, 0, columnSettings.splice(from, 1)[0]);
                    saveData(); renderHeaders(); renderTable();
                });
                // Resizer
                const resizer = document.createElement('div'); resizer.className = 'resizer';
                let startX, startW;
                resizer.addEventListener('mousedown', (e) => { e.preventDefault(); startX = e.pageX; startW = col.width; document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onUp); });
                function onMove(e) { col.width = Math.max(40, startW + (e.pageX - startX)); th.style.width = col.width + 'px'; }
                function onUp() { saveData(); renderTable(); document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); }
                th.appendChild(resizer);
                th.onclick = (e) => { if (e.target === th) { sortState = { key: col.key, direction: sortState.key === col.key && sortState.direction === 'asc' ? 'desc' : 'asc' }; renderHeaders(); renderTable(); } };
                if (sortState.key === col.key) th.classList.add(sortState.direction === 'asc' ? 'sort-asc' : 'sort-desc');
                tr.appendChild(th);
            });
            const thAct = document.createElement('th'); thAct.innerText = "Aktion"; thAct.style.width = "160px"; tr.appendChild(thAct); thead.appendChild(tr);
        }

        function renderTable() {
    const tbody = document.getElementById('filamentTableBody');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    // 1. Filter
    const filtered = inventory.filter(i => Object.values(i).some(v => String(v).toLowerCase().includes(search)));

    // 2. Sort
    const sorted = filtered.sort((a, b) => {
        let vA = a[sortState.key], vB = b[sortState.key];
        if (sortState.key === 'count') { vA = a.count; vB = b.count; }
        if (typeof vA === 'string') return vA.localeCompare(vB, undefined, { numeric: true });
        return sortState.direction === 'asc' ? (vA > vB ? 1 : -1) : (vA < vB ? 1 : -1);
    });

    // 3. Render using DocumentFragment
    const fragment = document.createDocumentFragment();

    sorted.forEach(item => {
        const tr = document.createElement('tr'); 
        const idx = inventory.indexOf(item);
        
        columnSettings.forEach(col => {
            const td = document.createElement('td');
            if (col.key === 'id') { 
                td.innerText = item.id; 
                td.style.fontWeight = 'bold'; 
            }
            else if (col.key === 'averagePrice') { 
                td.innerText = (item.averagePrice || 0).toFixed(2) + ' €'; 
            }
            else if (col.key === 'count') { 
                td.innerText = item.count; 
                td.style.textAlign = 'center'; 
                td.style.fontWeight = 'bold'; 
            }
            else {
                const inp = document.createElement('input');
                if (col.key === 'sample') { 
                    inp.type = 'checkbox'; 
                    inp.checked = item.sample; 
                    inp.onchange = (e) => updateEntry(idx, 'sample', e.target.checked); 
                }
                else {
                    inp.value = item[col.key]; 
                    if (col.key === 'weight') inp.type = 'number';
                    if (['brand', 'type', 'color'].includes(col.key)) {
                        inp.setAttribute('list', 'list' + col.key.charAt(0).toUpperCase() + col.key.slice(1) + 's');
                    }
                    inp.onchange = (e) => {
                        let v = e.target.value; 
                        if (col.key === 'brand') v = normalizeBrand(v); 
                        if (col.key === 'weight') v = parseFloat(v);
                        updateEntry(idx, col.key, v); 
                        if (col.key === 'brand') renderTable();
                    };
                }
                td.appendChild(inp);
            }
            tr.appendChild(td);
        });
        
        // Action buttons
        const tdAct = document.createElement('td');
        tdAct.innerHTML = `<div class="action-group">
            <button class="btn-mini btn-dec" onclick="changeCount(${idx}, -1)">-</button>
            <button class="btn-mini btn-inc" onclick="changeCount(${idx}, 1)">+</button>
            <button class="btn-mini btn-hist" onclick="showHistory(${idx})">🕒</button>
            <button class="btn-mini btn-del" onclick="deleteEntry(${idx})">✕</button>
        </div>`;
        tr.appendChild(tdAct);
        
        fragment.appendChild(tr);
    });

    tbody.innerHTML = '';
    tbody.appendChild(fragment);
}

        function addEntry() {
            const b = normalizeBrand(document.getElementById('newBrand').value);
            const t = document.getElementById('newType').value;
            if (!b) return alert("Marke fehlt!");
            const p = parseFloat(document.getElementById('newPrice').value) || 0;
            const c = parseFloat(document.getElementById('newCount').value) || 0;
            const existIdx = inventory.findIndex(i => normalizeBrand(i.brand) === b && i.type === t && i.color === document.getElementById('newColor').value);
            if (existIdx > -1) { addHistoryEntry(inventory[existIdx], c, "Nachkauf", p); alert("Bestand erhöht!"); }
            else {
                let id = calculateNextId(b, t);
                const ni = { id: id, brand: b, type: t, color: document.getElementById('newColor').value, info: document.getElementById('newInfo').value, weight: parseFloat(document.getElementById('newWeight').value) || 1000, sample: document.getElementById('newSample').checked, history: [] };
                addHistoryEntry(ni, c, "Neu", p); inventory.push(ni);
            }
            saveData(); renderTable();
        }

        function changeCount(idx, d) {
            if (inventory[idx].count + d < 0) return;
            addHistoryEntry(inventory[idx], d, d > 0 ? "Inkrement" : "Dekrement", d > 0 ? inventory[idx].averagePrice : 0);
            saveData(); renderTable();
        }
        function updateEntry(idx, k, v) { inventory[idx][k] = v; saveData(); }
        function deleteEntry(idx) { if (confirm("Löschen?")) { inventory.splice(idx, 1); saveData(); renderTable(); } }
        function updateAutocompleteLists() {
            ['brand', 'type', 'color', 'info'].forEach(k => {
                const l = document.getElementById('list' + k.charAt(0).toUpperCase() + k.slice(1) + 's');
                const options = [...new Set(inventory.map(i => i[k]))].filter(v => v).sort().map(v => `<option value="${v}">`).join('');
                if (l.innerHTML !== options) l.innerHTML = options;
            });
        }
        function showHistory(idx) {
            const i = inventory[idx];
            document.getElementById('historyTitle').innerText = `${i.brand} ${i.type}`;
            document.getElementById('historyTableBody').innerHTML = i.history.sort((a, b) => new Date(b.date) - new Date(a.date)).map(h => `<tr><td>${new Date(h.date).toLocaleDateString()}</td><td>${h.amount}</td><td>${(h.price || 0).toFixed(2)}€</td><td>${h.note}</td></tr>`).join('');
            document.getElementById('historyModal').classList.add('show'); document.getElementById('overlay').classList.add('show');
        }
    </script>
</body>
